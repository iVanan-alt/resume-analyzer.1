<!DOCTYPE html>
<html>
<head>
<title>Result</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h2>ATS Score: {{score}}%</h2>

    <h4>Skills Found</h4>
    <ul>
        {% for s in skills %}
        <li>{{s}}</li>
        {% endfor %}
    </ul>

    <h4>Missing Skills</h4>
    <ul>
        {% for m in missing %}
        <li>{{m}}</li>
        {% endfor %}
    </ul>

    <a href="/improve" class="btn btn-warning">Improve Resume</a>
</div>

</body>
</html>
