<!DOCTYPE html>
<html>
<head>
<title>Resume Builder</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h2>Create Resume</h2>

    <form>
        <input class="form-control mb-2" placeholder="Name">
        <input class="form-control mb-2" placeholder="Skills">
        <textarea class="form-control mb-2" placeholder="Projects"></textarea>
        <button class="btn btn-success">Generate Resume</button>
    </form>
</div>

</body>
</html>
